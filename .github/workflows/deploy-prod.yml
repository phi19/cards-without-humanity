name: Deploy to Raspberry PI

on:
  push:
    branches:
      - refactor/deploy-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: refactor/deploy-app

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: DATABASE_URL,JWT_SECRET,JWT_EXPIRES_IN,FRONTEND_URL
          script: |
            set -e

            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN }}"
            export FRONTEND_URL="${{ secrets.FRONTEND_URL }}"

            APP_DIR="/home/cards/www/cards-without-humanity"
            REPO_URL="https://github.com/phi19/cards-without-humanity.git"
            BRANCH="refactor/deploy-app"

            mkdir -p /home/cards/www

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repository..."
              git clone -b $BRANCH $REPO_URL "$APP_DIR"
            else
              echo "Updating repository..."
              cd "$APP_DIR"
              git fetch origin $BRANCH
              git reset --hard origin/$BRANCH
              git clean -fd
            fi

            cd "$APP_DIR"

            echo "DATABASE_URL=${DATABASE_URL}" > .env
            echo "JWT_SECRET=${JWT_SECRET}" >> .env
            echo "JWT_EXPIRES_IN=${JWT_EXPIRES_IN}" >> .env
            echo "FRONTEND_URL=${FRONTEND_URL}" >> .env


            # Se o certificado já existe, ativa a config SSL
            if [ -d "/var/lib/docker/volumes/cards-without-humanity_certbot-certs/_data/live/devas.pt" ]; then
              echo "Certificado SSL encontrado, a usar config SSL..."
              cp nginx/nginx-ssl.conf nginx/nginx.conf
            else
              echo "Sem certificado SSL, a usar config HTTP..."
            fi

            echo "Rebuilding containers..."
            docker compose down
            docker compose up -d --build

            echo "Reloading Nginx config..."
            docker compose exec nginx nginx -s reload || true

            echo "Deployment completed successfully!"