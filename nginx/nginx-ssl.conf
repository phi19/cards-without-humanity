events {}

http {
    # Redireciona HTTP → HTTPS
    server {
        listen 80;
        server_name devas.pt www.devas.pt;

        # Necessário para o desafio ACME do Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name devas.pt www.devas.pt;

        ssl_certificate     /etc/letsencrypt/live/devas.pt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devas.pt/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Proxy para o frontend SSR
        location / {
            proxy_pass         http://frontend-ssr:4000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy para o backend
        location /api/ {
            proxy_pass         http://backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}