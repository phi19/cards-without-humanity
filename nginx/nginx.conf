events {}

http {
    server {
        listen 80;
        server_name devas.pt www.devas.pt;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://frontend-ssr:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}