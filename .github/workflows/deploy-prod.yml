name: Deploy to Raspberry PI

on:
  push:
    branches:
      - refactor/application-deployment

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: refactor/application-deployment

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_DIR="/home/devas/www/cards-without-humanity"
            REPO_URL="https://github.com/phi19/cards-without-humanity.git"
            BRANCH="refactor/application-deployment"

            mkdir -p /home/devas/www

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repository..."
              git clone -b $BRANCH $REPO_URL "$APP_DIR"
            else
              echo "Updating repository..."
              cd "$APP_DIR"
              git fetch origin $BRANCH
              git reset --hard origin/$BRANCH
              git clean -fd
            fi

            cd "$APP_DIR"

            echo "Rebuilding containers..."
            docker compose down
            docker compose up -d --build

            echo "Reloading Nginx config..."
            docker compose exec nginx nginx -s reload || true

            echo "Deployment completed successfully!"